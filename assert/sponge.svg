<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sponge icon">
  <defs>
    <linearGradient id="spongeBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9d94f"/>
      <stop offset="100%" stop-color="#e8b63f"/>
    </linearGradient>
    <radialGradient id="bubble" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dfe8ee" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Sponge base -->
  <path filter="url(#shadow)"
        d="M105 175
           C120 105, 205 78, 285 110
           C345 135, 385 165, 450 155
           C500 147, 530 188, 520 255
           C512 320, 510 395, 468 438
           C430 477, 360 460, 302 470
           C232 482, 150 490, 102 445
           C52 399, 48 323, 62 260
           C72 222, 90 205, 105 175 Z"
        fill="url(#spongeBody)"/>

  <!-- Lower shading -->
  <path d="M65 300
           C95 390, 190 425, 290 420
           C360 417, 420 435, 468 438
           C430 477, 360 460, 302 470
           C232 482, 150 490, 102 445
           C67 413, 55 360, 65 300 Z"
        fill="#d79f35" opacity="0.45"/>

  <!-- Sponge holes -->
  <g fill="#d6a13a" opacity="0.75">
    <circle cx="170" cy="210" r="14"/>
    <circle cx="235" cy="190" r="10"/>
    <circle cx="310" cy="220" r="9"/>
    <circle cx="390" cy="205" r="16"/>
    <circle cx="145" cy="285" r="18"/>
    <circle cx="220" cy="315" r="26"/>
    <circle cx="308" cy="352" r="24"/>
    <circle cx="410" cy="300" r="22"/>
    <circle cx="155" cy="385" r="16"/>
    <circle cx="345" cy="410" r="12"/>
    <circle cx="430" cy="390" r="18"/>
  </g>

  <g fill="#d6a13a" opacity="0.55">
    <circle cx="190" cy="255" r="6"/>
    <circle cx="265" cy="270" r="8"/>
    <circle cx="345" cy="265" r="7"/>
    <circle cx="375" cy="345" r="5"/>
    <circle cx="275" cy="405" r="7"/>
    <circle cx="95" cy="330" r="4"/>
    <circle cx="440" cy="255" r="7"/>
  </g>

  <!-- Top-left bubbles -->
  <g fill="url(#bubble)">
    <circle cx="90" cy="120" r="28"/>
    <circle cx="145" cy="115" r="24"/>
    <circle cx="190" cy="95" r="20"/>
    <circle cx="125" cy="165" r="20"/>
    <circle cx="170" cy="145" r="18"/>
  </g>

  <!-- Bottom-right bubbles -->
  <g fill="url(#bubble)">
    <circle cx="405" cy="425" r="32"/>
    <circle cx="445" cy="410" r="26"/>
    <circle cx="372" cy="442" r="28"/>
    <circle cx="470" cy="445" r="20"/>
    <circle cx="395" cy="372" r="22"/>
    <circle cx="332" cy="410" r="14"/>
  </g>
</svg>
